apiVersion: apps/v1
kind: Deployment

metadata:
  name: finance-backend
  namespace: finance-apps

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: finance-backend

  template:
    metadata:
      labels:
        app: finance-backend

    spec:
      containers:

      - name: backend

        image: 552509717559.dkr.ecr.us-east-1.amazonaws.com/personal-finance-tracker-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5001

        envFrom:

        - secretRef:
            name: finance-secret

        - configMapRef:
            name: finance-config

        resources:

          requests:
            cpu: "100m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:

          httpGet:
            path: /health
            port: 5001

          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:

          httpGet:
            path: /health
            port: 5001

          initialDelaySeconds: 30
          periodSeconds: 20

---

apiVersion: v1

kind: Service

metadata:

  name: finance-backend-service

  namespace: finance-apps

spec:

  selector:
    app: finance-backend

  ports:

  - port: 5001

    targetPort: 5001

  type: ClusterIP