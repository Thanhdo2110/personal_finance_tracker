apiVersion: apps/v1
kind: Deployment

metadata:
  name: finance-frontend
  namespace: finance-apps

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: finance-frontend

  template:
    metadata:
      labels:
        app: finance-frontend

    spec:
      containers:

      - name: frontend

        image: 552509717559.dkr.ecr.us-east-1.amazonaws.com/personal-finance-tracker-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        env:
        - name: VITE_API_URL
          value: "http://finance-backend-service:5001"

        resources:

          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "300m"
            memory: "256Mi"

        readinessProbe:

          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:

          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 20
          periodSeconds: 20

---

apiVersion: v1

kind: Service

metadata:

  name: finance-frontend-service

  namespace: finance-apps

spec:

  selector:
    app: finance-frontend

  ports:

  - port: 80

    targetPort: 80

    nodePort: 32001

  type: NodePort