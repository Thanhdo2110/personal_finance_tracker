<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Báo cáo — Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <span><i class="fas fa-wallet" style="color:#ff682c;margin-right:8px;"></i>Finance</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
            <a href="transactions.html"><i class="fas fa-exchange-alt"></i> Giao dịch</a>
            <a href="categories.html"><i class="fas fa-tags"></i> Danh mục</a>
            <a href="budgets.html"><i class="fas fa-piggy-bank"></i> Ngân sách</a>
            <a href="reports.html" class="active"><i class="fas fa-chart-bar"></i> Báo cáo</a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="logout()" class="btn-ghost" style="width:100%;justify-content:center;color:#c62828;">
                <i class="fas fa-sign-out-alt" style="margin-right:6px;"></i> Đăng xuất
            </button>
        </div>
    </div>

    <!-- Main -->
    <main class="main-content">
        <div style="margin-bottom:24px;">
            <h1 class="page-title" style="margin-bottom:4px;">Báo cáo &amp; thống kê</h1>
            <div id="welcomeUser" style="font-size:14px;color:#4d4d4d;"></div>
        </div>

        <div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
            <select id="reportYear" onchange="loadReports()" style="width:auto;"></select>
            <select id="reportType" onchange="loadReports()" style="width:auto;">
                <option value="expense">Chi tiêu</option>
                <option value="income">Thu nhập</option>
            </select>
            <select id="reportMonth" onchange="loadReports()" style="width:auto;">
                <option value="0">Cả năm</option>
                <option value="1">Tháng 1</option><option value="2">Tháng 2</option><option value="3">Tháng 3</option>
                <option value="4">Tháng 4</option><option value="5">Tháng 5</option><option value="6">Tháng 6</option>
                <option value="7">Tháng 7</option><option value="8">Tháng 8</option><option value="9">Tháng 9</option>
                <option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
            </select>
        </div>

        <div class="grid-2" style="margin-bottom:20px;">
            <div class="card">
                <p style="font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#828282;margin-bottom:16px;">Báo cáo theo tháng</p>
                <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
            </div>
            <div class="card">
                <p style="font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#828282;margin-bottom:16px;">Theo danh mục</p>
                <div class="chart-container"><canvas id="categoryChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <p style="font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:#828282;margin-bottom:16px;">Chi tiết báo cáo</p>
            <div class="table-container">
                <table>
                    <thead><tr><th>Tháng</th><th style="text-align:right;">Thu nhập</th><th style="text-align:right;">Chi tiêu</th><th style="text-align:right;">Số dư</th></tr></thead>
                    <tbody id="reportTable">
                        <tr><td colspan="4" style="text-align:center;padding:40px;color:#828282;">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
