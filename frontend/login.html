<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body style="background: #efefef; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card" style="width: 100%; max-width: 420px; padding: 40px;">
        <!-- Logo -->
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="width: 48px; height: 48px; background: #ff682c; border-radius: 100%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px;">
                <i class="fas fa-wallet" style="color: white; font-size: 20px;"></i>
            </div>
            <h1 style="font-family: 'Space Grotesk', sans-serif; font-size: 22px; letter-spacing: -0.02em; color: #202020;">Finance Tracker</h1>
            <p style="font-size: 14px; color: #828282; margin-top: 4px;">Quản lý tài chính thông minh</p>
        </div>

        <!-- Tab pill -->
        <div style="display: flex; gap: 4px; background: #f5f5f5; border-radius: 200px; padding: 3px; margin-bottom: 28px;">
            <button id="loginTab" style="flex:1;padding:8px;border:none;border-radius:200px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;background:#ffffff;color:#202020;">Đăng nhập</button>
            <button id="registerTab" style="flex:1;padding:8px;border:none;border-radius:200px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:#828282;">Đăng ký</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div style="margin-bottom:16px;">
                <label for="loginUsername">Tên đăng nhập</label>
                <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập" required />
            </div>
            <div style="margin-bottom:20px;">
                <label for="loginPassword">Mật khẩu</label>
                <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required />
            </div>
            <div id="loginError" style="display:none;font-size:13px;color:#c62828;margin-bottom:12px;"></div>
            <button type="submit" class="btn-filled" style="width:100%;justify-content:center;padding:12px;">Đăng nhập</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" style="display:none;">
            <div style="margin-bottom:16px;">
                <label for="regUsername">Tên đăng nhập</label>
                <input type="text" id="regUsername" placeholder="Nhập tên đăng nhập" required />
            </div>
            <div style="margin-bottom:16px;">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="Nhập email" required />
            </div>
            <div style="margin-bottom:20px;">
                <label for="regPassword">Mật khẩu</label>
                <input type="password" id="regPassword" placeholder="Ít nhất 6 ký tự" required />
            </div>
            <div id="registerError" style="display:none;font-size:13px;color:#c62828;margin-bottom:12px;"></div>
            <button type="submit" class="btn-filled" style="width:100%;justify-content:center;padding:12px;">Đăng ký</button>
        </form>

        <p style="text-align:center;margin-top:20px;font-size:13px;color:#828282;">
            <a href="index.html" style="color:#4d4d4d;text-decoration:none;">&larr; Về trang chủ</a>
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
    loadAuth();
    if (isAuthenticated()) { window.location.href = 'dashboard.html'; }
    if (window.location.hash === '#register') {
        setTimeout(function(){ document.getElementById('registerTab').click(); }, 100);
    }

    function switchTab(active, inactive, show, hide) {
        active.style.background = '#ffffff'; active.style.color = '#202020';
        inactive.style.background = 'transparent'; inactive.style.color = '#828282';
        show.style.display = 'block'; hide.style.display = 'none';
    }

    document.getElementById('loginTab').addEventListener('click', function(){
        switchTab(this, document.getElementById('registerTab'),
            document.getElementById('loginForm'), document.getElementById('registerForm'));
    });

    document.getElementById('registerTab').addEventListener('click', function(){
        switchTab(this, document.getElementById('loginTab'),
            document.getElementById('registerForm'), document.getElementById('loginForm'));
    });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var err = document.getElementById('loginError');
        try {
            const result = await apiCall('/auth/login', 'POST', {
                username: document.getElementById('loginUsername').value,
                password: document.getElementById('loginPassword').value
            });
            saveAuth(result.access_token, result.user);
            window.location.href = 'dashboard.html';
        } catch (ex) { err.textContent = ex.message || 'Đăng nhập thất bại'; err.style.display = 'block'; }
    });

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var err = document.getElementById('registerError');
        try {
            await apiCall('/auth/register', 'POST', {
                username: document.getElementById('regUsername').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            });
            alert('Đăng ký thành công! Vui lòng đăng nhập.');
            document.getElementById('loginTab').click();
        } catch (ex) { err.textContent = ex.message || 'Đăng ký thất bại'; err.style.display = 'block'; }
    });
    </script>
</body>
</html>
