<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giao dịch — Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <span><i class="fas fa-wallet" style="color:#ff682c;margin-right:8px;"></i>Finance</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
            <a href="transactions.html" class="active"><i class="fas fa-exchange-alt"></i> Giao dịch</a>
            <a href="categories.html"><i class="fas fa-tags"></i> Danh mục</a>
            <a href="budgets.html"><i class="fas fa-piggy-bank"></i> Ngân sách</a>
            <a href="reports.html"><i class="fas fa-chart-bar"></i> Báo cáo</a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="logout()" class="btn-ghost" style="width:100%;justify-content:center;color:#c62828;">
                <i class="fas fa-sign-out-alt" style="margin-right:6px;"></i> Đăng xuất
            </button>
        </div>
    </div>

    <!-- Main -->
    <main class="main-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;flex-wrap:wrap;gap:12px;">
            <div>
                <h1 class="page-title" style="margin-bottom:4px;">Giao dịch</h1>
                <div id="welcomeUser" style="font-size:14px;color:#4d4d4d;"></div>
            </div>
            <button onclick="openAddModal()" class="btn-filled small"><i class="fas fa-plus"></i> Thêm giao dịch</button>
        </div>

        <!-- Filters -->
        <div class="card card-sm" style="margin-bottom:20px;">
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">
                <input type="text" id="searchInput" placeholder="Tìm kiếm..." oninput="loadTransactions()" />
                <select id="filterType" onchange="loadTransactions()">
                    <option value="">Tất cả loại</option>
                    <option value="income">Thu nhập</option>
                    <option value="expense">Chi tiêu</option>
                </select>
                <select id="filterCategory" onchange="loadTransactions()"><option value="">Tất cả danh mục</option></select>
                <input type="month" id="filterMonth" onchange="loadTransactions()" />
                <button onclick="exportCSV()" class="btn-outlined small"><i class="fas fa-download"></i> Export CSV</button>
            </div>
        </div>

        <!-- Table -->
        <div class="card" style="padding:0;overflow:hidden;">
            <div class="table-container">
                <table>
                    <thead><tr><th>Ngày</th><th>Loại</th><th>Danh mục</th><th>Mô tả</th><th style="text-align:right;">Số tiền</th><th style="text-align:center;">Thao tác</th></tr></thead>
                    <tbody id="transactionsTable">
                        <tr><td colspan="6" style="text-align:center;padding:40px;color:#828282;">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" style="display:flex;justify-content:center;margin-top:20px;"></div>
    </main>

    <!-- Add/Edit Modal -->
    <div id="transactionModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <span class="modal-title" id="modalTitle" style="margin-bottom:0;">Thêm giao dịch</span>
                <button onclick="closeModal()" class="btn-ghost"><i class="fas fa-times"></i></button>
            </div>
            <form id="transactionForm">
                <input type="hidden" id="txId" />
                <div style="margin-bottom:12px;">
                    <label for="txType">Loại</label>
                    <select id="txType" onchange="loadCategories()"><option value="expense">Chi tiêu</option><option value="income">Thu nhập</option></select>
                </div>
                <div style="margin-bottom:12px;">
                    <label for="txCategory">Danh mục</label>
                    <select id="txCategory" required></select>
                </div>
                <div style="margin-bottom:12px;">
                    <label for="txAmount">Số tiền (VNĐ)</label>
                    <input type="number" id="txAmount" placeholder="0" min="1" step="1000" required />
                </div>
                <div style="margin-bottom:12px;">
                    <label for="txDate">Ngày</label>
                    <input type="date" id="txDate" required />
                </div>
                <div style="margin-bottom:20px;">
                    <label for="txDescription">Mô tả</label>
                    <textarea id="txDescription" rows="2" placeholder="Mô tả giao dịch..."></textarea>
                </div>
                <div id="formError" style="display:none;font-size:13px;color:#c62828;margin-bottom:12px;"></div>
                <div style="display:flex;gap:8px;">
                    <button type="submit" class="btn-filled" style="flex:1;justify-content:center;">Lưu</button>
                    <button type="button" onclick="closeModal()" class="btn-outlined" style="flex:1;justify-content:center;">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="text-align:center;max-width:360px;">
            <i class="fas fa-exclamation-triangle" style="color:#c62828;font-size:36px;margin-bottom:12px;"></i>
            <p style="font-family:'Space Grotesk',sans-serif;font-size:20px;letter-spacing:-0.02em;margin-bottom:8px;">Xác nhận xóa</p>
            <p style="font-size:14px;color:#4d4d4d;margin-bottom:24px;">Bạn có chắc muốn xóa giao dịch này?</p>
            <div style="display:flex;gap:8px;">
                <button onclick="confirmDelete()" class="btn-filled" style="flex:1;justify-content:center;background:#c62828;">Xóa</button>
                <button onclick="closeDeleteModal()" class="btn-outlined" style="flex:1;justify-content:center;">Hủy</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/transactions.js"></script>
</body>
</html>
