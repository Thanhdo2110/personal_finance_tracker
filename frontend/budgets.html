<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ngân sách — Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <span><i class="fas fa-wallet" style="color:#ff682c;margin-right:8px;"></i>Finance</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
            <a href="transactions.html"><i class="fas fa-exchange-alt"></i> Giao dịch</a>
            <a href="categories.html"><i class="fas fa-tags"></i> Danh mục</a>
            <a href="budgets.html" class="active"><i class="fas fa-piggy-bank"></i> Ngân sách</a>
            <a href="reports.html"><i class="fas fa-chart-bar"></i> Báo cáo</a>
        </nav>
        <div class="sidebar-footer">
            <button onclick="logout()" class="btn-ghost" style="width:100%;justify-content:center;color:#c62828;">
                <i class="fas fa-sign-out-alt" style="margin-right:6px;"></i> Đăng xuất
            </button>
        </div>
    </div>

    <!-- Main -->
    <main class="main-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;flex-wrap:wrap;gap:12px;">
            <div>
                <h1 class="page-title" style="margin-bottom:4px;">Ngân sách</h1>
                <div id="welcomeUser" style="font-size:14px;color:#4d4d4d;"></div>
            </div>
            <button onclick="openAddModal()" class="btn-filled small"><i class="fas fa-plus"></i> Thêm ngân sách</button>
        </div>

        <div style="display:flex;gap:12px;margin-bottom:24px;">
            <select id="budgetMonth" onchange="loadBudgets()" style="width:auto;">
                <option value="1">Tháng 1</option><option value="2">Tháng 2</option><option value="3">Tháng 3</option>
                <option value="4">Tháng 4</option><option value="5">Tháng 5</option><option value="6">Tháng 6</option>
                <option value="7">Tháng 7</option><option value="8">Tháng 8</option><option value="9">Tháng 9</option>
                <option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
            </select>
            <select id="budgetYear" onchange="loadBudgets()" style="width:auto;"></select>
        </div>

        <div id="budgetsList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;">
            <div style="grid-column:1/-1;text-align:center;padding:60px;color:#828282;">Đang tải.....</div>
        </div>

        <div id="noBudgets" style="display:none;text-align:center;padding:60px;">
            <i class="fas fa-piggy-bank" style="font-size:48px;color:#d1d5db;margin-bottom:16px;"></i>
            <p style="font-family:'Space Grotesk',sans-serif;font-size:20px;letter-spacing:-0.02em;color:#4d4d4d;">Chưa có ngân sách</p>
            <p style="font-size:14px;color:#828282;margin-top:4px;">Nhấn "Thêm ngân sách" để bắt đầu</p>
        </div>
    </main>

    <!-- Modal -->
    <div id="budgetModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <span class="modal-title" style="margin-bottom:0;">Thêm ngân sách</span>
                <button onclick="closeBudgetModal()" class="btn-ghost"><i class="fas fa-times"></i></button>
            </div>
            <form id="budgetForm">
                <div style="margin-bottom:12px;">
                    <label for="budgetCategory">Danh mục chi tiêu</label>
                    <select id="budgetCategory" required></select>
                </div>
                <div style="margin-bottom:20px;">
                    <label for="budgetAmount">Số tiền ngân sách (VNĐ)</label>
                    <input type="number" id="budgetAmount" placeholder="0" min="1" step="10000" required />
                </div>
                <div id="budgetFormError" style="display:none;font-size:13px;color:#c62828;margin-bottom:12px;"></div>
                <div style="display:flex;gap:8px;">
                    <button type="submit" class="btn-filled" style="flex:1;justify-content:center;">Lưu</button>
                    <button type="button" onclick="closeBudgetModal()" class="btn-outlined" style="flex:1;justify-content:center;">Hủy</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/budgets.js"></script>
</body>
</html>
