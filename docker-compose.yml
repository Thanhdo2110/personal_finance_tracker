version: "3.9"

services:

  finance-db:
    image: mysql:8.0
    container_name: finance-mysql-db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: 2110
      MYSQL_DATABASE: finance_tracker

    ports:
      - "3307:3306"

    volumes:
      - finance-db-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p2110"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - finance-network

  finance-backend:
    build:
      context: ./backend

    container_name: finance-backend

    restart: unless-stopped

    depends_on:
      finance-db:
        condition: service_healthy

    environment:
      DB_HOST: finance-mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 2110
      DB_NAME: finance_tracker

    ports:
      - "5001:5001"

    networks:
      - finance-network

  finance-frontend:
    build:
      context: ./frontend

    container_name: finance-frontend

    restart: unless-stopped

    depends_on:
      - finance-backend

    ports:
      - "3001:80"

    environment:
      VITE_API_URL: http://finance-backend:5001

    networks:
      - finance-network

volumes:

  finance-db-data:

networks:

  finance-network:
    driver: bridge